<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaysABook — Admin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2">
  <style>
    .admin-wrap{max-width:1000px;margin:0 auto;padding:24px}
    .ah{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0 22px;border-bottom:1px solid var(--line);margin-bottom:24px}
    .ah .brand .nm b{font-size:20px}
    .ah .who{font-size:13px;color:var(--ink-3)}
    .btn{border:1px solid var(--line-2);background:#fff;color:var(--ink);font-weight:600;font-size:14px;border-radius:10px;padding:10px 16px;display:inline-flex;align-items:center;gap:8px;transition:.14s}
    .btn:hover{border-color:var(--brand-300);box-shadow:var(--sh-1)}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.primary:hover{background:var(--brand-700);border-color:var(--brand-700)}
    .btn.danger{color:#b42318;border-color:#f1c9c4}
    .btn.danger:hover{background:#fef2f1;border-color:#e0908a}
    .btn.ghost{border-color:transparent;background:transparent;color:var(--ink-2)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* login */
    .login{max-width:380px;margin:8vh auto;text-align:center}
    .login .logo-mark{margin:0 auto 18px}
    .login h1{font-family:var(--display);font-weight:600;font-size:26px;margin:0 0 6px}
    .login p{color:var(--ink-3);font-size:14px;margin:0 0 26px}
    .field{text-align:left;margin-bottom:14px}
    .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:11px 13px;font-size:14.5px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:.15s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(46,154,212,.13)}
    .login .btn{width:100%;justify-content:center;padding:13px}
    .msg{font-size:13px;margin-top:12px;min-height:18px}
    .msg.err{color:#b42318}.msg.ok{color:var(--green)}

    /* toolbar + list */
    .atools{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    .atools .searchwrap{flex:1 1 260px;max-width:none}
    .count{font-size:13px;color:var(--ink-3)}
    .rows{display:flex;flex-direction:column;gap:8px}
    .row{display:flex;gap:14px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;box-shadow:var(--sh-1)}
    .row .ic{width:42px;height:60px;border-radius:5px;overflow:hidden;flex:0 0 auto;background:var(--bg-3)}
    .row .ic img{width:100%;height:100%;object-fit:cover}
    .row .ic .mini{width:100%;height:100%;display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:700}
    .row .info{flex:1 1 auto;min-width:0}
    .row .info .t{font-family:var(--display);font-weight:600;font-size:15px;line-height:1.2}
    .row .info .a{font-size:12.5px;color:var(--ink-2)}
    .row .acts{display:flex;gap:8px;flex:0 0 auto}
    .empty-state{text-align:center;color:var(--ink-3);padding:50px 20px}

    /* editor modal */
    .ed-scrim{position:fixed;inset:0;background:rgba(10,28,40,.5);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:80;overflow:auto}
    .ed-scrim.open{display:flex}
    .ed{background:#fff;border-radius:18px;max-width:620px;width:100%;box-shadow:var(--sh-3);padding:24px}
    .ed h2{font-family:var(--display);font-weight:600;font-size:22px;margin:0 0 18px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .cover-pick{display:flex;gap:14px;align-items:center;margin:6px 0 16px}
    .cover-pick .prev{width:74px;height:104px;border-radius:6px;overflow:hidden;background:var(--bg-3);flex:0 0 auto;border:1px solid var(--line-2)}
    .cover-pick .prev img{width:100%;height:100%;object-fit:cover}
    .ed-foot{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:20px}
    @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login" style="display:none">
  <span class="logo-mark" aria-hidden="true">
    <svg viewBox="0 0 44 44" width="52" height="52">
      <defs><linearGradient id="rbGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5EBBE8"/><stop offset="1" stop-color="#1B6699"/></linearGradient></defs>
      <path d="M22 13c3.4-2.2 7.6-3.2 12-2.6v21c-4.4-.6-8.6.4-12 2.6V13z" fill="url(#rbGrad)"/>
      <path d="M22 13C18.6 10.8 14.4 9.8 10 10.4v21c4.4-.6 8.6.4 12 2.6V13z" fill="url(#rbGrad)" opacity=".55"/>
      <rect x="3.5" y="31" width="4.2" height="4.2" rx="1" fill="#2E9AD4"/>
    </svg>
  </span>
  <h1>RaysABook Admin</h1>
  <p>Sign in to manage the catalog.</p>
  <form id="loginForm">
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" required></div>
    <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" required></div>
    <button class="btn primary" type="submit" id="loginBtn">Sign in</button>
    <div class="msg" id="loginMsg"></div>
  </form>
</div>

<!-- APP -->
<div id="appView" class="admin-wrap" style="display:none">
  <div class="ah">
    <a class="brand" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 44 44" width="36" height="36">
          <path d="M22 13c3.4-2.2 7.6-3.2 12-2.6v21c-4.4-.6-8.6.4-12 2.6V13z" fill="url(#rbGrad)"/>
          <path d="M22 13C18.6 10.8 14.4 9.8 10 10.4v21c4.4-.6 8.6.4 12 2.6V13z" fill="url(#rbGrad)" opacity=".55"/>
        </svg>
      </span>
      <span class="nm"><b>Rays<i style="font-style:normal;color:var(--brand)">A</i>Book</b><span>Admin</span></span>
    </a>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="who" id="who"></span>
      <button class="btn ghost" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="atools">
    <button class="btn primary" id="addBtn">+ Add book</button>
    <div class="searchwrap">
      <svg class="ic" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3)"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="adminSearch" type="search" placeholder="Search title, author, ISBN…" autocomplete="off" style="padding-left:42px">
    </div>
    <span class="count" id="adminCount"></span>
  </div>

  <div class="rows" id="rows"></div>
  <div class="empty-state" id="emptyState" style="display:none">No books found.</div>
</div>

<!-- EDITOR -->
<div class="ed-scrim" id="edScrim">
  <div class="ed">
    <h2 id="edTitle">Add book</h2>
    <div class="field"><label>Title *</label><input id="f_title" required></div>
    <div class="cover-pick">
      <div class="prev" id="coverPrev"></div>
      <div>
        <label class="field" style="display:block;margin:0 0 8px;font-size:12.5px;font-weight:600;color:var(--ink-2)">Cover image</label>
        <input id="f_cover" type="file" accept="image/*" style="font-size:13px">
        <div style="font-size:11.5px;color:var(--ink-3);margin-top:5px">Optional. Auto-resized to a small thumbnail.</div>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>Author</label><input id="f_author"></div>
      <div class="field"><label>Year</label><input id="f_year"></div>
      <div class="field"><label>Format</label><input id="f_format" placeholder="Paperback, Hardcover…"></div>
      <div class="field"><label>Genre</label><input id="f_genre"></div>
      <div class="field"><label>Publisher</label><input id="f_publisher"></div>
      <div class="field"><label>Pages</label><input id="f_pages"></div>
      <div class="field" style="grid-column:1/-1"><label>ISBN</label><input id="f_isbn"></div>
    </div>
    <div class="msg" id="edMsg"></div>
    <div class="ed-foot">
      <button class="btn danger" id="edDelete" style="display:none">Delete</button>
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn ghost" id="edCancel">Cancel</button>
        <button class="btn primary" id="edSave">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=1"></script>
<script src="admin.js?v=1"></script>
</body>
</html>
